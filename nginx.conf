server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Evita front desatualizado apos deploy: html/js/css sempre revalidados
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Midias e fontes com cache forte
    location ~* \.(png|jpg|jpeg|gif|ico|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para a API do backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback para SPA (Single Page App)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
